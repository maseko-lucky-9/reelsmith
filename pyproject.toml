[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "integration: hits real network/services; opt-in",
    "live: full end-to-end against live YouTube; opt-in",
    "e2e: deterministic end-to-end against fixtures",
    "playwright: UI smoke tests via Playwright; requires running services",
    "timeout: per-test wall-clock timeout in seconds (pytest-timeout)",
]
addopts = "-m 'not integration and not live and not playwright'"
filterwarnings = []
